<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шортлист кандидатов</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;display:flex;align-items:center;justify-content:center;min-height:100vh}
.lock{background:#fff;border-radius:20px;padding:48px 40px;box-shadow:0 8px 32px rgba(0,0,0,.1);text-align:center;max-width:380px;width:90%}
.icon{font-size:3rem;margin-bottom:16px}
h1{font-size:1.2rem;color:#1a1a2e;margin-bottom:8px}
p{font-size:.88rem;color:#636e72;margin-bottom:24px}
input{width:100%;padding:14px 18px;border:2px solid #dfe6e9;border-radius:12px;font-size:1rem;outline:none;transition:border .2s}
input:focus{border-color:#0984e3}
button{width:100%;padding:14px;background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:12px;transition:transform .2s}
button:hover{transform:translateY(-1px)}
.err{color:#d63031;font-size:.85rem;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="lock" id="lockScreen">
<div class="icon">&#128274;</div>
<h1>Доступ ограничен</h1>
<p>Введите пароль для просмотра шортлиста</p>
<input type="password" id="pwd" placeholder="Пароль" autofocus onkeydown="if(event.key==='Enter')decrypt()">
<button onclick="decrypt()">Открыть</button>
<div class="err" id="err">Неверный пароль</div>

async function decrypt(){
  try{
    const pwd=document.getElementById("pwd").value;
    const enc=new TextEncoder();
    const salt=Uint8Array.from(atob(SALT),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(IV),c=>c.charCodeAt(0));
    const ct=Uint8Array.from(atob(CT),c=>c.charCodeAt(0));
    const keyMaterial=await crypto.subtle.importKey("raw",enc.encode(pwd),"PBKDF2",false,["deriveBits","deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},keyMaterial,{name:"AES-GCM",length:256},false,["decrypt"]);
    const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById("err").style.display="block";
    document.getElementById("pwd").style.borderColor="#d63031";
  }
}
</script>
